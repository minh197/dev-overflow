services:
  postgres:
    image: postgres:15
    container_name: devoverflow_postgres
    restart: always
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: devoverflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  typesense:
    image: typesense/typesense:0.29.0
    container_name: devoverflow_typesense
    restart: unless-stopped
    ports:
      - "8110:8108"
    environment:
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_API_KEY: devoverflow-typesense-dev-key
      TYPESENSE_ENABLE_CORS: "true"
    volumes:
      - typesense_data:/data

volumes:
  postgres_data:
  typesense_data:
